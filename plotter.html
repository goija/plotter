<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Gray Code Encoder - Pro Dashboard</title>
    <style>
        :root {
            --bg: #05070a;
            --panel: #0f172a;
            --accent: #00f2ff;
            --border: #1e293b;
            --text: #f8fafc;
            --danger: #ef4444;
            --success: #22c55e;
        }

        body {
            margin: 0; background: var(--bg); color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif; 
            display: grid;
            grid-template-columns: 320px 1fr 300px;
            grid-template-rows: 60px 1fr 200px;
            height: 100vh; gap: 10px; padding: 10px; box-sizing: border-box;
        }

        header { grid-column: 1 / -1; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); padding: 0 20px; background: var(--panel); border-radius: 8px; }
        
        .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; }
        
        #main-render { grid-column: 2; grid-row: 2; position: relative; background: #000; }
        canvas#glcanvas { width: 100%; height: 100%; }

        .sidebar-left { grid-column: 1; grid-row: 2 / 4; display: flex; flex-direction: column; gap: 10px; }
        .sidebar-right { grid-column: 3; grid-row: 2 / 4; display: flex; flex-direction: column; gap: 10px; }
        .bottom-bar { grid-column: 2; grid-row: 3; }

        .stat-card { padding: 15px; border-bottom: 1px solid var(--border); }
        .stat-value { font-family: monospace; font-size: 1.8rem; color: var(--accent); }
        
        h2 { font-size: 0.7rem; text-transform: uppercase; color: #64748b; margin: 0 0 10px 0; letter-spacing: 1px; }

        textarea { 
            width: 100%; height: 70px; background: #020617; color: #94a3b8; 
            border: 1px solid var(--border); border-radius: 4px; font-size: 10px; 
            margin-bottom: 8px; resize: none; outline: none; font-family: monospace; padding: 5px;
            box-sizing: border-box;
        }
        
        button { 
            width: 100%; padding: 12px; background: var(--accent); color: #000; 
            border: none; border-radius: 4px; font-weight: bold; cursor: pointer;
            text-transform: uppercase;
        }

        #log { font-size: 0.75rem; color: #94a3b8; height: 100%; overflow-y: auto; padding: 10px; background: #020617; }
        .log-entry { border-left: 2px solid var(--accent); padding-left: 8px; margin-bottom: 5px; }
        .log-err { border-left-color: var(--danger); color: var(--danger); }
        
        #sparkline { width: 100%; height: 100px; background: #020617; }
    </style>
</head>
<body>

    <header>
        <div style="font-weight: bold; color: var(--accent);">GRAY CODE ENCODER V5.1</div>
        <div id="connection-status" style="color: var(--danger); font-size: 0.8rem; font-weight: bold;">STATUS: OFFLINE</div>
    </header>

    <aside class="sidebar-left">
        <div class="panel" style="flex: 0.8;">
            <div class="stat-card">
                <h2>Actuele Hoek</h2>
                <div class="stat-value" id="angle-display">0.000°</div>
            </div>
            <div class="stat-card">
                <h2>Raw Sensor Data</h2>
                <div class="stat-value" id="raw-bits" style="font-size: 1.2rem;">0000 0000 0000</div>
            </div>
            
            <div style="padding: 15px;">
                <h2>WebRTC Handshake</h2>
                <textarea id="offerInput" placeholder="1. Plak Offer uit terminal (v=0...)"></textarea>
                <button id="processBtn">Genereer Antwoord</button>
                <textarea id="answerOutput" readonly style="margin-top: 10px;" placeholder="2. Kopieer dit naar terminal..."></textarea>
            </div>
        </div>
        
        <div class="panel" style="flex: 0.2;">
            <div id="log">
                <div class="log-entry">Dashboard gereed. Wachten op verbinding...</div>
            </div>
        </div>
    </aside>

    <main id="main-render" class="panel">
        <canvas id="glcanvas"></canvas>
    </main>

    <aside class="sidebar-right">
        <div class="panel" style="flex: 1;">
            <div class="stat-card">
                <h2>Stabiliteit (Latency)</h2>
                <canvas id="sparkline"></canvas>
            </div>
            <div class="stat-card">
                <h2>Netwerk Info</h2>
                <div id="ice-status" style="font-size: 0.8rem; color: var(--accent);">Staat: Idle</div>
                <div style="font-size: 0.8rem; margin-top: 5px;">Pakketten: <span id="packet-count">0</span></div>
            </div>
        </div>
    </aside>

    <footer class="bottom-bar panel" style="justify-content: center; padding: 20px;">
        <div style="color: #64748b; font-size: 0.8rem; text-align: center;">
            C++ WebRTC Pipeline &bull; libdatachannel &bull; 32-bit Binary Stream
        </div>
    </footer>

    <script>
        const pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
        let packetCount = 0;
        let lastValues = new Array(60).fill(0);

        const canvas = document.getElementById('glcanvas');
        const ctx = canvas.getContext('2d');
        const sparkCanvas = document.getElementById('sparkline');
        const sCtx = sparkCanvas.getContext('2d');

        function addLog(msg, isErr = false) {
            const logEl = document.getElementById('log');
            const div = document.createElement('div');
            div.className = isErr ? 'log-entry log-err' : 'log-entry';
            div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logEl.prepend(div);
        }

        // WebRTC Events
        pc.ondatachannel = (event) => {
            const dc = event.channel;
            dc.binaryType = "arraybuffer";
            dc.onopen = () => {
                document.getElementById('connection-status').innerText = "STATUS: ONLINE";
                document.getElementById('connection-status').style.color = "var(--success)";
                addLog("DataChannel verbonden! Ontvangen van data...");
            };
            dc.onmessage = (e) => {
                packetCount++;
                document.getElementById('packet-count').innerText = packetCount;
                const view = new DataView(e.data);
                const rawVal = view.getUint32(0, true);
                const angle = (rawVal % 360);
                
                document.getElementById('angle-display').innerText = `${angle.toFixed(3)}°`;
                document.getElementById('raw-bits').innerText = rawVal.toString(2).padStart(12, '0').replace(/(.{4})/g, '$1 ');

                lastValues.push(angle);
                lastValues.shift();
                drawEncoder(angle);
                drawSparkline();
            };
        };

        pc.oniceconnectionstatechange = () => {
            document.getElementById('ice-status').innerText = `ICE: ${pc.iceConnectionState}`;
        };

        // Handshake Logica
        document.getElementById('processBtn').onclick = async () => {
            const offerSdp = document.getElementById('offerInput').value.trim();
            if (!offerSdp.startsWith('v=0')) {
                addLog("FOUT: Ongeldige offer (moet beginnen met v=0)", true);
                return;
            }

            try {
                addLog("Offer verwerken...");
                await pc.setRemoteDescription(new RTCSessionDescription({ type: 'offer', sdp: offerSdp }));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);

                addLog("Answer aangemaakt. Wachten op ICE...");
                
                // Wacht even tot de SDP is ingevuld met candidates
                const checkIce = setInterval(() => {
                    if (pc.localDescription.sdp.includes('a=candidate') || pc.iceGatheringState === 'complete') {
                        document.getElementById('answerOutput').value = pc.localDescription.sdp;
                        addLog("Klaar! Kopieer de Answer naar de terminal.");
                        clearInterval(checkIce);
                    }
                }, 100);
            } catch (err) {
                addLog("CRITICAL: " + err.message, true);
            }
        };

        // Teken functies
        function drawEncoder(angle) {
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate((angle * Math.PI) / 180);
            for (let i = 0; i < 16; i++) {
                ctx.beginPath(); ctx.moveTo(0, 0);
                ctx.arc(0, 0, 150, (i * Math.PI) / 8, ((i + 1) * Math.PI) / 8);
                ctx.strokeStyle = i % 2 === 0 ? "#00f2ff" : "#1e293b";
                ctx.lineWidth = 2; ctx.stroke();
                if (i % 2 === 0) { ctx.fillStyle = "rgba(0, 242, 255, 0.05)"; ctx.fill(); }
            }
            ctx.restore();
            // Statische indicator
            ctx.beginPath(); ctx.moveTo(cx, cy - 170); ctx.lineTo(cx, cy - 140);
            ctx.strokeStyle = "#ef4444"; ctx.lineWidth = 4; ctx.stroke();
        }

        function drawSparkline() {
            sCtx.clearRect(0, 0, sparkCanvas.width, sparkCanvas.height);
            sCtx.beginPath(); sCtx.strokeStyle = "#00f2ff"; sCtx.lineWidth = 2;
            for(let i=0; i<lastValues.length; i++) {
                const x = (i / lastValues.length) * sparkCanvas.width;
                const y = sparkCanvas.height - (lastValues[i] / 360) * sparkCanvas.height;
                if(i === 0) sCtx.moveTo(x, y); else sCtx.lineTo(x, y);
            }
            sCtx.stroke();
        }

        function resize() {
            canvas.width = canvas.clientWidth; canvas.height = canvas.clientHeight;
            sparkCanvas.width = sparkCanvas.clientWidth; sparkCanvas.height = sparkCanvas.clientHeight;
            drawEncoder(0);
        }
        window.onresize = resize;
        resize();
    </script>
</body>
</html>
