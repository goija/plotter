<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTEX // 901_SLOT_PRECISION_v56.0</title>
    <style>
        :root {
            --bg: #000400; --panel: #000f00; --accent: #00ff41; 
            --solar: #ffcc00; --moon: #cbd5e0; --vega: #ffffff; --orion: #00d4ff;
            --border: #002200; --night: #050515; --text: #e0e0e0;
        }

        body {
            margin: 0; background: var(--bg); color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        header {
            background: var(--panel); padding: 10px 20px; border-bottom: 2px solid var(--accent);
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
        }

        .controls {
            padding: 15px 20px; background: rgba(0,20,0,0.9); border-bottom: 1px solid var(--border);
            display: grid; grid-template-columns: 1fr 1fr 150px; gap: 20px; align-items: center;
        }

        .scroll-area { flex: 1; overflow-y: auto; padding: 10px; background: #000; }
        
        .matrix-wrapper {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 8px;
        }

        .node-cell {
            background: #000; border: 1px solid var(--border); padding: 12px;
            font-size: 0.7rem; transition: 0.2s; position: relative;
        }

        .node-cell:hover { border-color: var(--accent); z-index: 10; transform: scale(1.02); }
        .is-night { background: var(--night); opacity: 0.8; }
        .is-master { border-color: var(--solar); box-shadow: inset 0 0 10px rgba(255, 204, 0, 0.1); }

        .node-id { position: absolute; top: 5px; left: 8px; color: var(--accent); font-weight: bold; opacity: 0.5; }
        
        .angle-data { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-top: 8px; }
        .angle-box { background: rgba(0,255,65,0.05); padding: 4px; border-radius: 2px; text-align: center; }
        .label { display: block; font-size: 0.5rem; opacity: 0.6; text-transform: uppercase; }
        .val { font-weight: bold; color: var(--solar); }

        .scrubber { width: 100%; -webkit-appearance: none; background: #111; height: 4px; border-radius: 2px; }
        .scrubber::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: var(--accent); cursor: pointer; border-radius: 50%; }

        .footer { padding: 8px 20px; background: var(--panel); border-top: 1px solid var(--accent); font-size: 0.65rem; display: flex; justify-content: space-between; }

        .loc-btn { background: #000; color: var(--accent); border: 1px solid var(--accent); padding: 4px 8px; cursor: pointer; font-family: inherit; font-size: 0.7rem; }
        .loc-btn.active { background: var(--accent); color: #000; }
    </style>
</head>
<body>

<header>
    <div style="letter-spacing: 2px; font-weight: bold;">VORTEX_901_PRECISION // GRID_v56.0</div>
    <div id="master-time" style="color: var(--solar);">109 DAGEN // 12:00:00 LST</div>
</header>

<div class="controls">
    <div class="slider-group">
        <label style="font-size: 0.6rem; color: var(--accent);">DAG VAN HET JAAR (1-365)</label>
        <input type="range" id="day-scrub" class="scrubber" min="1" max="365" value="109">
    </div>
    <div class="slider-group">
        <label style="font-size: 0.6rem; color: var(--accent);">LOKALE STERRENTIJD (0-24u)</label>
        <input type="range" id="lst-scrub" class="scrubber" min="0" max="24" step="0.01" value="12">
    </div>
    <div style="display: flex; flex-direction: column; gap: 5px;">
        <button class="loc-btn active" id="btn-laren" onclick="toggleLoc(52.26, true)">LAREN</button>
        <button class="loc-btn" id="btn-pole" onclick="toggleLoc(-90.0, false)">ZUIDPOOL</button>
    </div>
</div>

<div class="scroll-area">
    <div class="matrix-wrapper" id="grid"></div>
</div>

<div class="footer">
    <div>901 NODES SYNCED // RESOLUTIE: 0.3996°</div>
    <div style="color: var(--accent);">OPERATOR: RIANNE GOIJARTS</div>
</div>

<script>
    let currentLat = 52.26;
    const targets = {
        zon:   { ra: 0, dec: 0, color: '#ffcc00' },
        moon:  { ra: 5.0, dec: 20.0, color: '#cbd5e0' },
        vega:  { ra: 18.61, dec: 38.78, color: '#ffffff' },
        orion: { ra: 5.60, dec: -1.20, color: '#00d4ff' }
    };

    function toggleLoc(lat, isLaren) {
        currentLat = lat;
        document.getElementById('btn-laren').classList.toggle('active', isLaren);
        document.getElementById('btn-pole').classList.toggle('active', !isLaren);
        updateGrid();
    }

    function calculate(lst, lat, target) {
        const phi = lat * (Math.PI/180);
        const dec = target.dec * (Math.PI/180);
        const hRad = (lst - target.ra) * 15 * (Math.PI/180);
        const sinAlt = Math.sin(phi)*Math.sin(dec) + Math.cos(phi)*Math.cos(dec)*Math.cos(hRad);
        return Math.asin(sinAlt) * (180/Math.PI);
    }

    function initGrid() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        for (let i = 0; i < 901; i++) {
            const node = document.createElement('div');
            node.className = 'node-cell';
            if (i === 450) node.classList.add('is-master'); // Greenwich/Centrum referentie
            node.id = `node-${i}`;
            node.innerHTML = `
                <div class="node-id">${i}</div>
                <div id="lon-${i}" style="opacity: 0.7; margin-bottom: 5px;">0°</div>
                <div class="angle-data">
                    <div class="angle-box"><span class="label">Elev</span><span class="val" id="alt-${i}-zon">0°</span></div>
                    <div class="angle-box"><span class="label">Azim</span><span class="val" id="az-${i}-zon">0°</span></div>
                </div>
                <div style="margin-top: 5px; font-size: 0.5rem; color: var(--accent); display: flex; justify-content: space-between;">
                    <span>VEGA: <span id="alt-${i}-vega">0°</span></span>
                    <span>ORION: <span id="alt-${i}-orion">0°</span></span>
                </div>
            `;
            grid.appendChild(node);
        }
        updateGrid();
    }

    function updateGrid() {
        const day = parseInt(document.getElementById('day-scrub').value);
        const lst = parseFloat(document.getElementById('lst-scrub').value);
        
        targets.zon.dec = 23.45 * Math.sin((2 * Math.PI / 365) * (day - 81));
        targets.zon.ra = ((day - 81) / 365) * 24;

        document.getElementById('master-time').innerText = `${day} DAGEN // ${lst.toFixed(2)}u STERRENTIJD`;

        for (let i = 0; i < 901; i++) {
            // Longitude berekening voor 901 slots
            const lon = (i * (360/901)) - 180;
            const nodeLst = (lst + (lon/15)) % 24;
            
            const altZon = calculate(nodeLst, currentLat, targets.zon);
            const altVega = calculate(nodeLst, currentLat, targets.vega);
            const altOrion = calculate(nodeLst, currentLat, targets.orion);

            const cell = document.getElementById(`node-${i}`);
            document.getElementById(`lon-${i}`).innerText = `${lon.toFixed(2)}° ${lon >= 0 ? 'O' : 'W'}`;
            document.getElementById(`alt-${i}-zon`).innerText = altZon.toFixed(1) + '°';
            document.getElementById(`alt-${i}-vega`).innerText = altVega.toFixed(0) + '°';
            document.getElementById(`alt-${i}-orion`).innerText = altOrion.toFixed(0) + '°';

            // Azimut benadering voor grid-weergave
            const hRad = (nodeLst - targets.zon.ra) * 15 * (Math.PI/180);
            const az = Math.atan2(-Math.sin(hRad), Math.tan(targets.zon.dec * Math.PI/180) * Math.cos(currentLat * Math.PI/180) - Math.sin(currentLat * Math.PI/180) * Math.cos(hRad));
            document.getElementById(`az-${i}-zon`).innerText = Math.round((az * 180/Math.PI + 180) % 360) + '°';

            if (altZon < -0.8) cell.classList.add('is-night');
            else cell.classList.remove('is-night');
        }
    }

    document.getElementById('day-scrub').addEventListener('input', updateGrid);
    document.getElementById('lst-scrub').addEventListener('input', updateGrid);

    initGrid();
</script>
</body>
</html>
