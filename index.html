<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Atmos Monitor - Type-Safe Fix</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cbor-x@1.5.3/dist/index.min.js"></script>
    <style>
        body { background: #050505; color: #0f0; font-family: monospace; padding: 20px; }
        .wrapper { border: 1px solid #0f0; max-width: 900px; margin: 0 auto; padding: 20px; }
        #status { color: red; font-weight: bold; float: right; }
        .online { color: #0f0 !important; }
        #chart-wrap { height: 300px; margin: 20px 0; border: 1px solid #222; }
        #log { height: 120px; overflow-y: auto; font-size: 11px; color: #666; border-top: 1px solid #222; padding-top: 10px; }
    </style>
</head>
<body>
    <div class="wrapper">
        <span id="status">OFFLINE</span>
        <div>SYSTEM_VERSION: ATMOS_V11_STABLE</div>
        <div id="chart-wrap"><canvas id="mainChart"></canvas></div>
        <div id="log">> Systeem gereed...<br></div>
    </div>

<script>
    const logBox = document.getElementById('log');
    const statusBox = document.getElementById('status');
    const decoder = new CBOR.Decoder();
    let chart, pc, socket;

    function addLog(msg) {
        logBox.innerHTML += `[${new Date().toLocaleTimeString()}] ${msg}<br>`;
        logBox.scrollTop = logBox.scrollHeight;
    }

    // Chart.js Setup
    const ctx = document.getElementById('mainChart').getContext('2d');
    chart = new Chart(ctx, {
        type: 'line',
        data: { labels: [], datasets: [
            { label: 'Entropy', borderColor: '#3498db', data: [], tension: 0.1, pointRadius: 0 },
            { label: 'Anomaly', borderColor: '#e74c3c', data: [], tension: 0.1, pointRadius: 0 }
        ]},
        options: { responsive: true, maintainAspectRatio: false, animation: false }
    });

    function start() {
        pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });

        socket = new WebSocket('ws://127.0.0.1:8081');

        // Veilig verzenden functie om de 'type is null' fout te voorkomen
        const safeSend = (obj) => {
            if (obj && obj.type && socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify(obj));
            }
        };

        pc.ondatachannel = (event) => {
            const dc = event.channel;
            dc.binaryType = "arraybuffer";
            dc.onopen = () => {
                statusBox.innerText = "ONLINE";
                statusBox.className = "online";
                addLog("✅ TUNNEL STATUS: GEOPEND");
            };
            dc.onmessage = (e) => {
                const data = decoder.decode(new Uint8Array(e.data));
                const time = new Date().toLocaleTimeString();
                chart.data.labels.push(time);
                chart.data.datasets[0].data.push(data.entropy);
                chart.data.datasets[1].data.push(data.anomaly);
                if (chart.data.labels.length > 50) chart.data.labels.shift();
                chart.update('none');
            };
        };

        socket.onopen = () => {
            addLog("Signaling verbonden. 'join' sturen...");
            safeSend({ type: "join" });
        };

        socket.onmessage = async (e) => {
            try {
                const msg = JSON.parse(e.data);
                if (!msg.type) return;

                if (msg.type === "offer") {
                    addLog("Offer ontvangen.");
                    await pc.setRemoteDescription(new RTCSessionDescription(msg));
                    const answer = await pc.createAnswer();
                    await pc.setLocalDescription(answer);
                    safeSend({ type: "answer", sdp: pc.localDescription.sdp });
                } else if (msg.type === "candidate" && msg.candidate) {
                    await pc.addIceCandidate(new RTCIceCandidate(msg.candidate));
                }
            } catch (err) { console.error("JSON parse fout", err); }
        };

        pc.onicecandidate = (e) => {
            if (e.candidate) {
                safeSend({ type: "candidate", candidate: e.candidate });
            }
        };

        socket.onclose = () => {
            addLog("🔌 Verbinding verbroken. Herstart over 3s...");
            setTimeout(() => location.reload(), 3000);
        };
    }

    window.onload = start;
</script>
</body>
</html>
