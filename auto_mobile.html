<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VORTEX OMNI BRIDGE v26.5</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #050505;
            --card: #111;
            --accent: #00f2ff;
            --text: #e0e0e0;
            --danger: #ff3e3e;
            --success: #00ff88;
        }

        body {
            margin: 0; background: var(--bg); color: var(--text);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        header {
            padding: 15px; background: #000; border-bottom: 1px solid #222;
            display: flex; justify-content: space-between; align-items: center;
        }

        .status-indicator { display: flex; align-items: center; font-size: 12px; font-weight: bold; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--danger); margin-right: 8px; box-shadow: 0 0 10px var(--danger); }
        .online .dot { background: var(--success); box-shadow: 0 0 10px var(--success); }

        main { flex: 1; padding: 10px; display: flex; flex-direction: column; gap: 10px; }

        .stat-card {
            background: var(--card); border-radius: 8px; padding: 15px;
            border-left: 4px solid var(--accent);
        }

        .stat-value { font-family: monospace; font-size: 28px; color: var(--accent); }
        .stat-label { font-size: 10px; text-transform: uppercase; color: #666; }

        .chart-wrapper {
            flex: 1; background: var(--card); border-radius: 8px; padding: 10px;
            position: relative; min-height: 200px;
        }

        .controls { padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button {
            background: #222; border: 1px solid #444; color: white; padding: 12px;
            border-radius: 5px; font-weight: bold; cursor: pointer;
        }
        button:active { background: var(--accent); color: black; }
    </style>
</head>
<body>

    <header id="status-header">
        <div>VORTEX <span style="color:var(--accent)">OMNI_v26.5</span></div>
        <div class="status-indicator">
            <div class="dot"></div>
            <span id="status-text">DISCONNECTED (8081)</span>
        </div>
    </header>

    <main>
        <div class="stat-card">
            <div class="stat-label">Real-time Stream Value</div>
            <div class="stat-value" id="live-val">0.0000</div>
        </div>

        <div class="chart-wrapper">
            <canvas id="vortexChart"></canvas>
        </div>
    </main>

    <div class="controls">
        <button onclick="location.reload()">RECONNECT</button>
        <button onclick="toggleFullscreen()">FULLSCREEN</button>
    </div>

    <script>
        let pc;
        let chart;
        const maxPoints = 50;
        const statusHeader = document.getElementById('status-header');
        const statusText = document.getElementById('status-text');
        const valDisplay = document.getElementById('live-val');

        // Initialiseer de grafiek
        function initChart() {
            const ctx = document.getElementById('vortexChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Array(maxPoints).fill(''),
                    datasets: [{
                        data: Array(maxPoints).fill(0),
                        borderColor: '#00f2ff',
                        borderWidth: 2,
                        pointRadius: 0,
                        fill: true,
                        backgroundColor: 'rgba(0, 242, 255, 0.05)',
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: false,
                    scales: {
                        y: { min: -1.2, max: 1.2, grid: { color: '#222' } },
                        x: { display: false }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        // De WebRTC verbinding opzetten
        function connect() {
            // VERBINDING MET POORT 8081 (Zoals in webrtc_sender.cpp)
            const ws = new WebSocket('ws://' + window.location.hostname + ':8081');

            ws.onopen = () => {
                statusHeader.classList.add('online');
                statusText.innerText = "CONNECTED (8081)";
                console.log("WebSocket open");
            };

            ws.onmessage = async (e) => {
                const msg = JSON.parse(e.data);
                
                // Handshake logic voor webrtc_sender.cpp
                if (msg.type === 'offer') {
                    pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });

                    pc.onicecandidate = (event) => {
                        if (event.candidate) {
                            ws.send(JSON.stringify({ type: 'candidate', candidate: event.candidate.candidate, mid: event.candidate.sdpMid }));
                        }
                    };

                    pc.ondatachannel = (event) => {
                        const dc = event.channel;
                        dc.binaryType = "arraybuffer";
                        dc.onmessage = (evt) => {
                            const data = new Float32Array(evt.data);
                            const val = data[0];
                            
                            // Update UI
                            valDisplay.innerText = val.toFixed(4);
                            chart.data.datasets[0].data.push(val);
                            chart.data.datasets[0].data.shift();
                            chart.update('none');
                        };
                    };

                    await pc.setRemoteDescription(new RTCSessionDescription(msg));
                    const answer = await pc.createAnswer();
                    await pc.setLocalDescription(answer);
                    ws.send(JSON.stringify({ type: 'answer', sdp: pc.localDescription.sdp }));
                } 
                else if (msg.type === 'candidate' && pc) {
                    await pc.addIceCandidate(new RTCIceCandidate({ candidate: msg.candidate, sdpMid: msg.mid }));
                }
            };

            ws.onclose = () => {
                statusHeader.classList.remove('online');
                statusText.innerText = "OFFLINE - RECONNECTING...";
                setTimeout(connect, 2000);
            };
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        }

        window.onload = () => {
            initChart();
            connect();
        };
    </script>
</body>
</html>
