<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heluo Qi WebRTC Monitor</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; text-align: center; }
        .grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            gap: 10px; max-width: 400px; margin: 20px auto; 
        }
        .cell { 
            background: #333; border: 2px solid #555; aspect-ratio: 1;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; position: relative; transition: background 0.3s;
        }
        .main-num { font-size: 2.5rem; font-weight: bold; }
        .sub-num { position: absolute; top: 5px; right: 10px; font-size: 1.2rem; color: #aaa; }
        .status-panel { margin-top: 20px; padding: 10px; background: #222; display: inline-block; border-radius: 8px; }
        .error { color: #ff4444; font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <h1>Heluo Qi Explorations</h1>
    <p id="connection-status">Status: Verbinding maken met signaling...</p>

    <div class="grid" id="luoshu-grid">
        </div>

    <div class="status-panel">
        <div>Entropy (c): <span id="val-entropy">-</span></div>
        <div>Gray Anomaly: <span id="val-anomaly">-</span></div>
        <div>Color Weight (CCW): <span id="val-ccw">-</span></div>
        <div id="error-msg" class="error" style="display:none;">! OPERATIONAL ERROR !</div>
    </div>

    <script>
        const gridContainer = document.getElementById('luoshu-grid');
        const statusText = document.getElementById('connection-status');
        
        // Initialiseer 3x3 grid
        for (let i = 0; i < 9; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.id = `cell-${i}`;
            cell.innerHTML = `<span class="sub-num">?</span><span class="main-num">?</span>`;
            gridContainer.appendChild(cell);
        }

        // --- WebRTC & Signaling ---
        const ws = new WebSocket('ws://localhost:8081');
        const pc = new RTCPeerConnection({
            iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
        });

        ws.onopen = () => {
            statusText.innerText = "Status: Signaling verbonden. Join verzenden...";
            ws.send(JSON.stringify({ type: 'join' }));
        };

        ws.onmessage = async (event) => {
            const msg = JSON.parse(event.data);
            if (msg.type === 'offer' || msg.type === 'answer') {
                await pc.setRemoteDescription(new RTCSessionDescription(msg));
                if (msg.type === 'offer') {
                    const answer = await pc.createAnswer();
                    await pc.setLocalDescription(answer);
                    ws.send(JSON.stringify({ type: 'answer', sdp: pc.localDescription.sdp }));
                }
            } else if (msg.type === 'candidate') {
                await pc.addIceCandidate(new RTCIceCandidate(msg.candidate));
            }
        };

        pc.onicecandidate = (event) => {
            if (event.candidate) {
                ws.send(JSON.stringify({ type: 'candidate', candidate: event.candidate }));
            }
        };

        pc.ondatachannel = (event) => {
            const dc = event.channel;
            setupDataChannel(dc);
        };

        // Fallback voor als de client de channel aanmaakt (zoals in onze C++ code)
        pc.onconnectionstatechange = () => console.log("Connection State:", pc.connectionState);

        function setupDataChannel(dc) {
            dc.binaryType = 'arraybuffer';
            dc.onopen = () => {
                statusText.innerText = "Status: DataChannel OPEN";
                statusText.style.color = "#00ff00";
            };

            dc.onmessage = (event) => {
                // DECODEER BINAIRE PAYLOAD (Overeenkomstig met struct HeluoPayload)
                // Layout: float(4), float(4), float(4), uint8(1), uint8(1), uint8(1), uint8(1) = 16 bytes
                const view = new DataView(event.data);
                
                const data = {
                    entropy: view.getFloat32(0, true),   // true = little-endian
                    anomaly: view.getFloat32(4, true),
                    ccw: view.getFloat32(8, true),
                    mainNum: view.getUint8(12),
                    subNum: view.getUint8(13),
                    c_index: view.getUint8(14),
                    status: view.getUint8(15)
                };

                updateUI(data);
            };
        }

        function updateUI(data) {
            // Update tekst velden
            document.getElementById('val-entropy').innerText = data.entropy.toFixed(2);
            document.getElementById('val-anomaly').innerText = data.anomaly.toFixed(2);
            document.getElementById('val-ccw').innerText = data.ccw.toFixed(4);
            
            // Error handling (Red Reserved)
            const errorMsg = document.getElementById('error-msg');
            errorMsg.style.display = data.status === 1 ? 'block' : 'none';

            // Update het Luoshu grid (mapping op basis van mainNum)
            // Zoek de cel die bij dit Luoshu getal hoort
            const mainPattern = [9, 5, 7, 8, 1, 3, 4, 6, 2];
            const cellIndex = mainPattern.indexOf(data.mainNum);
            
            if (cellIndex !== -1) {
                const cell = document.getElementById(`cell-${cellIndex}`);
                cell.querySelector('.main-num').innerText = data.mainNum;
                cell.querySelector('.sub-num').innerText = data.subNum;

                // Kleur berekening (Blauw naar Groen op basis van CCW)
                if (data.status === 1) {
                    cell.style.background = "#8B0000"; // Rood bij error
                } else {
                    const g = Math.floor(data.ccw * 255);
                    const b = 255 - g;
                    cell.style.background = `rgb(0, ${g}, ${b})`;
                }
            }
        }
    </script>
</body>
</html>
