<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTEX // ANGULAR_SYNC_v55.0</title>
    <style>
        :root {
            --bg: #000400; --panel: #000f00; --accent: #00ff41; 
            --solar: #ffcc00; --moon: #cbd5e0; --vega: #ffffff; --orion: #00d4ff;
            --border: #003300; --night: #050515; --text: #e0e0e0;
        }

        body {
            margin: 0; background: var(--bg); color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh;
            padding: 15px; box-sizing: border-box;
        }

        .dashboard {
            background: rgba(0, 15, 0, 0.9); border: 2px solid var(--accent);
            width: 100%; max-width: 1000px; border-radius: 8px; overflow: hidden;
        }

        .header { background: var(--panel); padding: 15px; border-bottom: 2px solid var(--accent); display: flex; justify-content: space-between; align-items: center; }
        
        .loc-toggle { display: flex; gap: 5px; background: #000; padding: 3px; border: 1px solid var(--border); }
        .loc-btn { padding: 5px 10px; font-size: 0.7rem; border: none; background: none; color: var(--accent); cursor: pointer; opacity: 0.5; }
        .loc-btn.active { opacity: 1; background: var(--border); font-weight: bold; }

        .radar-grid { display: grid; grid-template-columns: 1fr 1fr; border-bottom: 1px solid var(--border); }
        .viz-box { padding: 20px; display: flex; flex-direction: column; align-items: center; background: #000; }
        canvas { border-radius: 50%; border: 1px solid var(--border); background: radial-gradient(circle, #001a00, #000); }

        .controls { padding: 20px; background: rgba(0,0,0,0.5); display: flex; flex-direction: column; gap: 15px; }
        .slider-group { display: flex; flex-direction: column; gap: 5px; }
        .slider-label { display: flex; justify-content: space-between; font-size: 0.7rem; color: var(--accent); }
        
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; background: var(--border); }
        input[type=range]::-webkit-slider-thumb { height: 18px; width: 10px; background: var(--accent); cursor: pointer; -webkit-appearance: none; margin-top: -7px; }

        .telemetry-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--border); }
        .target-panel { background: #000; padding: 15px; text-align: center; }
        .t-name { font-weight: bold; font-size: 0.9rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; }
        
        .angle-box { margin: 10px 0; padding: 5px; background: rgba(255,255,255,0.03); border-radius: 4px; }
        .angle-label { font-size: 0.6rem; opacity: 0.6; display: block; }
        .angle-val { font-size: 1.2rem; font-weight: 900; font-variant-numeric: tabular-nums; }

        .vis-badge { font-size: 0.6rem; padding: 3px; border-radius: 2px; font-weight: bold; display: block; margin-top: 5px; }
        .vis-plus { background: var(--accent); color: #000; }

        .footer { padding: 10px; background: var(--panel); border-top: 1px solid var(--accent); font-size: 0.7rem; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="header">
        <div style="font-weight: bold;">VORTEX_ANGULAR_SYNC_v55.0</div>
        <div class="loc-toggle">
            <button class="loc-btn active" onclick="setLoc(52.26, 'LAREN')">LAREN</button>
            <button class="loc-btn" onclick="setLoc(-90.00, 'ZUIDPOOL')">ZUIDPOOL</button>
        </div>
    </div>

    <div class="radar-grid">
        <div class="viz-box">
            <canvas id="radar" width="300" height="300"></canvas>
            <div id="season-tag" style="font-size: 0.7rem; margin-top: 10px; color: var(--solar);">LENTE // 19 APRIL</div>
        </div>
        <div class="controls">
            <div class="slider-group">
                <div class="slider-label"><span>MACRO: DAG VAN HET JAAR</span><span id="day-val">109</span></div>
                <input type="range" id="day-scrub" min="1" max="365" value="109">
            </div>
            <div class="slider-group">
                <div class="slider-label"><span>MICRO: STERRENTIJD (LST)</span><span id="lst-val">12.00u</span></div>
                <input type="range" id="lst-scrub" min="0" max="24" step="0.01" value="12">
            </div>
            <div style="font-size: 0.6rem; opacity: 0.7;">
                LOCATIE: <span id="loc-name">LAREN</span> | LAT: <span id="loc-lat">52.26</span>°
            </div>
        </div>
    </div>

    <div class="telemetry-grid" id="telemetry">
        </div>

    <div class="footer">
        <div id="env-status">DAGLICHT_ACTIEF</div>
        <div>OPERATOR: RIANNE GOIJARTS</div>
    </div>
</div>

<script>
    let currentLat = 52.26;
    const targets = {
        zon:   { ra: 0, dec: 0, color: '#ffcc00', label: 'ZON' },
        moon:  { ra: 5.0, dec: 20.0, color: '#cbd5e0', label: 'MAAN' },
        vega:  { ra: 18.61, dec: 38.78, color: '#ffffff', label: 'VEGA' },
        orion: { ra: 5.60, dec: -1.20, color: '#00d4ff', label: 'ORION' }
    };

    function setLoc(lat, name) {
        currentLat = lat;
        document.getElementById('loc-name').innerText = name;
        document.getElementById('loc-lat').innerText = lat.toFixed(2);
        document.querySelectorAll('.loc-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        update();
    }

    function calculate(lst, t) {
        const phi = currentLat * (Math.PI/180);
        const dec = t.dec * (Math.PI/180);
        const hRad = (lst - t.ra) * 15 * (Math.PI/180);

        const sinAlt = Math.sin(phi)*Math.sin(dec) + Math.cos(phi)*Math.cos(dec)*Math.cos(hRad);
        const alt = Math.asin(sinAlt) * (180/Math.PI);

        const y = -Math.sin(hRad) * Math.cos(dec);
        const x = Math.sin(dec) * Math.cos(phi) - Math.cos(dec) * Math.sin(phi) * Math.cos(hRad);
        let az = Math.atan2(y, x) * (180/Math.PI);
        return { alt, az: (az + 180) % 360 };
    }

    function update() {
        const day = parseInt(document.getElementById('day-scrub').value);
        const lst = parseFloat(document.getElementById('lst-scrub').value);
        
        targets.zon.dec = 23.45 * Math.sin((2 * Math.PI / 365) * (day - 81));
        targets.zon.ra = ((day - 81) / 365) * 24;
        if(targets.zon.ra < 0) targets.zon.ra += 24;

        document.getElementById('day-val').innerText = day;
        document.getElementById('lst-val').innerText = lst.toFixed(2) + 'u';

        const telGrid = document.getElementById('telemetry');
        telGrid.innerHTML = '';
        const results = {};

        for (const k in targets) {
            const data = calculate(lst, targets[k]);
            results[k] = data;
            
            telGrid.innerHTML += `
                <div class="target-panel" style="color:${targets[k].color}">
                    <div class="t-name">${targets[k].label}</div>
                    <div class="angle-box">
                        <span class="angle-label">ELEVATIE (h)</span>
                        <span class="angle-val">${data.alt.toFixed(2)}°</span>
                    </div>
                    <div class="angle-box">
                        <span class="angle-label">AZIMUT (Az)</span>
                        <span class="angle-val">${data.az.toFixed(1)}°</span>
                    </div>
                    <span class="vis-badge ${data.alt > 0 ? 'vis-plus' : ''}">${data.alt > 0 ? 'ZICHTBAAR' : 'ONDER HORIZON'}</span>
                </div>
            `;
        }
        draw(results);
    }

    function draw(data) {
        const c = document.getElementById('radar');
        const ctx = c.getContext('2d');
        const cx = 150, cy = 150, R = 130;
        ctx.clearRect(0,0,300,300);
        ctx.strokeStyle = 'rgba(0, 255, 65, 0.2)';
        [0, 30, 60].forEach(a => {
            ctx.beginPath(); ctx.arc(cx,cy, R * ((90-a)/90), 0, 2*Math.PI); ctx.stroke();
        });
        for(const k in data) {
            const d = data[k];
            const r = R * ((90-d.alt)/90);
            const ang = (d.az - 90) * (Math.PI/180);
            ctx.fillStyle = d.alt > 0 ? targets[k].color : 'rgba(100,100,100,0.2)';
            ctx.beginPath(); ctx.arc(cx + r * Math.cos(ang), cy + r * Math.sin(ang), 5, 0, 2*Math.PI); ctx.fill();
        }
    }

    document.getElementById('day-scrub').addEventListener('input', update);
    document.getElementById('lst-scrub').addEventListener('input', update);
    update();
</script>
</body>
</html>
