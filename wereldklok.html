<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laren Command Center | Network Health Monitor</title>
    <style>
        :root {
            --bg: #020617;
            --panel: #0f172a;
            --master: #facc15;
            --border: #1e293b;
            --text: #f8fafc;
            --accent: #00f2ff;
            --solar: #fbbf24;
            --nl-node: #22c55e;
            --danger: #ef4444;
        }

        body {
            margin: 0; background: var(--bg); color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 25px; border-bottom: 1px solid var(--border); background: var(--panel);
        }

        .logo-text { font-weight: bold; color: var(--master); letter-spacing: 2px; }

        #search-box {
            background: #020617; border: 1px solid var(--border); color: white;
            padding: 8px 15px; border-radius: 6px; width: 250px; outline: none;
        }

        main { flex: 1; overflow-y: auto; padding: 20px; }

        .node-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px; max-width: 1800px; margin: 0 auto;
        }

        .node-card {
            background: var(--panel); border: 1px solid var(--border);
            border-radius: 10px; padding: 18px; position: relative;
        }

        .node-card.master {
            grid-column: 1 / -1; border: 2px solid var(--master);
            background: linear-gradient(90deg, rgba(250,204,21,0.1) 0%, rgba(15,23,42,1) 100%);
            margin-bottom: 15px;
        }

        .node-card.nl-special { border-color: var(--nl-node); }

        /* Network Metrics Styling */
        .network-stats {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
            margin-top: 15px; padding-top: 10px; border-top: 1px dashed var(--border);
            font-family: monospace; font-size: 0.75rem;
        }

        .metric { display: flex; flex-direction: column; }
        .m-label { color: var(--dim); font-size: 0.6rem; text-transform: uppercase; }
        .m-value { color: var(--accent); font-weight: bold; }

        .speed-bar-bg { width: 100%; height: 4px; background: #1e293b; border-radius: 2px; margin-top: 4px; overflow: hidden; }
        .speed-bar-fill { height: 100%; width: 0%; background: var(--accent); transition: width 0.5s ease; }

        .master .m-value { color: var(--master); }
        .master .speed-bar-fill { background: var(--master); }

        .time-standard { font-family: monospace; font-size: 1.5rem; color: var(--text); font-weight: bold; }
        .master .time-standard { font-size: 3rem; color: var(--master); }

        .solar-box { margin-top: 10px; color: var(--solar); font-size: 0.8rem; font-family: monospace; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    </style>
</head>
<body>

    <header>
        <div class="logo-text">LAREN_CORE // NETWORK_SYNC</div>
        <input type="text" id="search-box" placeholder="Filter op stad of regio...">
    </header>

    <main>
        <div class="node-grid" id="nodeContainer"></div>
    </main>

    <script>
        const nodesData = [
            { id: "MASTER", name: "Laren (NH)", lon: 5.22, isMaster: true, type: "CENTRAL_HUB" },
            { id: 201, name: "Hilversum", lon: 5.17, type: "MEDIA_GATEWAY", isNL: true },
            { id: 202, name: "Zwolle", lon: 6.09, type: "REGIONAL_HUB", isNL: true },
            { id: 203, name: "Franeker", lon: 5.54, type: "NORTH_NODE", isNL: true },
            { id: 204, name: "Scherpenisse", lon: 4.10, type: "ZEELAND_EDGE", isNL: true },
            { id: 205, name: "Tholen", lon: 4.22, type: "ZEELAND_EDGE", isNL: true }
        ];

        // Vul aan tot 90 nodes
        for (let i = nodesData.length; i < 90; i++) {
            nodesData.push({ id: 300 + i, name: "Satellite Node", lon: (Math.random() * 360 - 180), type: "CLOUD_EDGE", isNL: false });
        }

        function calculateSolarTime(longitude) {
            const now = new Date();
            const utcMin = (now.getUTCHours() * 60) + now.getUTCMinutes() + (now.getUTCSeconds() / 60);
            let solarMin = (utcMin + (longitude * 4) + 1440) % 1440;
            const h = Math.floor(solarMin / 60);
            const m = Math.floor(solarMin % 60);
            return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
        }

        function buildGrid(filter = "") {
            const container = document.getElementById('nodeContainer');
            const filtered = nodesData.filter(n => n.name.toLowerCase().includes(filter));
            
            container.innerHTML = filtered.map(node => `
                <div class="node-card ${node.isMaster ? 'master' : ''} ${node.isNL ? 'nl-special' : ''}">
                    <div style="font-size:0.6rem; color:var(--dim)">${node.type} // ID_${node.id}</div>
                    <div class="city-name">${node.name}</div>
                    <div class="time-standard" id="st-${node.id}">00:00:00</div>
                    
                    <div class="solar-box">SOLAR: <span id="sol-${node.id}">00:00</span></div>

                    <div class="network-stats">
                        <div class="metric">
                            <span class="m-label">Latency</span>
                            <span class="m-value" id="lt-${node.id}">0ms</span>
                        </div>
                        <div class="metric">
                            <span class="m-label">Jitter</span>
                            <span class="m-value" id="jt-${node.id}">±0ms</span>
                        </div>
                        <div class="metric" style="grid-column: 1 / -1">
                            <span class="m-label">Speed / Bandwidth</span>
                            <span class="m-value" id="sp-${node.id}">0 Gbps</span>
                            <div class="speed-bar-bg"><div class="speed-bar-fill" id="pb-${node.id}"></div></div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function update() {
            const now = new Date();
            nodesData.forEach(node => {
                // Tijd Update
                const st = document.getElementById(`st-${node.id}`);
                const sol = document.getElementById(`sol-${node.id}`);
                if (st) st.innerText = now.toLocaleTimeString('nl-NL', { hour12: false });
                if (sol) sol.innerText = calculateSolarTime(node.lon);

                // Network Simulation
                let lat, jitter, speed;
                if(node.isMaster) {
                    lat = (Math.random() * 2).toFixed(1);
                    jitter = (Math.random() * 0.1).toFixed(2);
                    speed = (95 + Math.random() * 5).toFixed(1);
                } else {
                    lat = Math.floor(Math.random() * 40) + 5;
                    jitter = (Math.random() * 5).toFixed(1);
                    speed = (Math.random() * 10).toFixed(1);
                }

                if(document.getElementById(`lt-${node.id}`)) {
                    document.getElementById(`lt-${node.id}`).innerText = `${lat}ms`;
                    document.getElementById(`jt-${node.id}`).innerText = `±${jitter}ms`;
                    document.getElementById(`sp-${node.id}`).innerText = `${speed} Gbps`;
                    document.getElementById(`pb-${node.id}`).style.width = `${(speed/100)*100}%`;
                }
            });
        }

        document.getElementById('search-box').addEventListener('input', e => buildGrid(e.target.value.toLowerCase()));

        buildGrid();
        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
