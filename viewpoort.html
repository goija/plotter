<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>12x12 CSS Grid (8.333vw) - Alle Opties</title>
    <style>
        /* Reset de marges */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #2c3e50; 
            overflow: hidden; 
        }

        /* =========================================
           DE 12x12 CSS GRID CONTAINER
           ========================================= */
        .grid-container {
            display: grid;
            
            /* 12 kolommen van exact 8.333vw */
            grid-template-columns: repeat(12, 8.333vw);
            
            /* 12 rijen van 15vh. Totaal 180vh (activeert verticale scroll) */
            grid-template-rows: repeat(12, 15vh);
            
            width: 100vw;
            height: 100vh;
            
            overflow-y: auto; 
            overflow-x: hidden; 
        }

        /* Basisopmaak voor alle blokken */
        .box {
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            text-align: center;
            padding: 5px;
            box-sizing: border-box;
            border: 1px solid rgba(0, 0, 0, 0.4);
            font-size: 0.8em; /* Kleinere tekst voor de smalle blokjes */
        }

        /* Kleurenpalet */
        .bg-1 { background-color: #3498db; }
        .bg-2 { background-color: #2980b9; }
        .bg-3 { background-color: #1abc9c; }
        .bg-4 { background-color: #16a085; }
        .bg-5 { background-color: #e74c3c; }
        .bg-6 { background-color: #c0392b; }
        .bg-7 { background-color: #9b59b6; }
        .bg-8 { background-color: #8e44ad; }
        .bg-9 { background-color: #f1c40f; color: #333; }
        .bg-10 { background-color: #f39c12; }

        /* =========================================
           HET SAMENVOEGEN (1 tot 12 kolommen)
           ========================================= */
        .span-2 { grid-column: span 2; }  /* 16.66vw (1/6) */
        .span-3 { grid-column: span 3; }  /* 25vw (1/4) */
        .span-4 { grid-column: span 4; }  /* 33.33vw (1/3) */
        .span-5 { grid-column: span 5; }  /* ~41.6vw */
        .span-6 { grid-column: span 6; }  /* 50vw (1/2) */
        .span-7 { grid-column: span 7; }  /* ~58.3vw */
        .span-8 { grid-column: span 8; }  /* 66.66vw (2/3) */
        .span-9 { grid-column: span 9; }  /* 75vw (3/4) */
        .span-10 { grid-column: span 10; } /* ~83.3vw */
        .span-11 { grid-column: span 11; } /* ~91.6vw */
        .span-12 { grid-column: span 12; } /* 100vw (Volledig) */

        /* =========================================
           MOBIEL (RESPONSIEF)
           ========================================= */
        @media (max-width: 768px) {
            .grid-container {
                grid-template-columns: 100vw; 
                grid-template-rows: auto;
                height: 100vh;
            }
            
            /* Reset alle spans op mobiel naar 100% breedte */
            .box {
                grid-column: span 1 !important;
                min-height: 10vh;
            }
        }
    </style>
</head>
<body>

    <div class="grid-container">
        
        <div class="box bg-1">1</div><div class="box bg-2">1</div><div class="box bg-3">1</div><div class="box bg-4">1</div>
        <div class="box bg-1">1</div><div class="box bg-2">1</div><div class="box bg-3">1</div><div class="box bg-4">1</div>
        <div class="box bg-1">1</div><div class="box bg-2">1</div><div class="box bg-3">1</div><div class="box bg-4">1</div>

        <div class="box bg-5 span-2">2</div><div class="box bg-6 span-2">2</div><div class="box bg-5 span-2">2</div>
        <div class="box bg-6 span-2">2</div><div class="box bg-5 span-2">2</div><div class="box bg-6 span-2">2</div>

        <div class="box bg-7 span-3">Kwart (3)</div><div class="box bg-8 span-3">Kwart (3)</div>
        <div class="box bg-7 span-3">Kwart (3)</div><div class="box bg-8 span-3">Kwart (3)</div>

        <div class="box bg-9 span-4">Derde (4)</div><div class="box bg-10 span-4">Derde (4)</div><div class="box bg-9 span-4">Derde (4)</div>

        <div class="box bg-1 span-6">Helft (6)</div><div class="box bg-2 span-6">Helft (6)</div>

        <div class="box bg-3 span-12">Volledige Breedte (12)</div>

        <div class="box bg-5 span-2">Menu (2)</div>
        <div class="box bg-6 span-8">Hoofdcontent (8)</div>
        <div class="box bg-5 span-2">Zijbalk (2)</div>

        <div class="box bg-7 span-3">Zijbalk (3)</div>
        <div class="box bg-8 span-9">Hoofdcontent (9)</div>

        <div class="box bg-9 span-5">Links (5)</div>
        <div class="box bg-10 span-7">Rechts (7)</div>

        <div class="box bg-1 span-1">1</div>
        <div class="box bg-2 span-10">Gecentreerd (10)</div>
        <div class="box bg-1 span-1">1</div>

        <div class="box bg-3 span-4">Blok (4)</div>
        <div class="box bg-4 span-2">Blok (2)</div>
        <div class="box bg-3 span-6">Blok (6)</div>

        <div class="box bg-5 span-3">3</div>
        <div class="box bg-6 span-1">1</div>
        <div class="box bg-5 span-4">4</div>
        <div class="box bg-6 span-1">1</div>
        <div class="box bg-5 span-3">3</div>

    </div>

</body>
</html>
