<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viewport Units: 50% and 16.6%</title>
    <style>
        /* Reset margins so our viewport math isn't thrown off by default spacing */
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: white;
            text-align: center;
        }

        h2 {
            color: #333;
        }

        /* 50% of the Viewport Width and Height */
        .half-screen {
            width: 50vw;
            height: 50vh;
            background-color: #2c3e50;
            
            /* Flexbox to center the text inside */
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
            
            /* Optional: Add a shadow for better visibility */
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        /* Container for the 1/6th boxes */
        .one-sixth-container {
            display: flex;
            gap: 1vw; /* Tiny gap based on viewport width */
        }

        /* 16.6% of the Viewport Width */
        .one-sixth-screen {
            width: 16.6vw;
            height: 16.6vw; /* Making it a perfect square based on width */
            background-color: #e74c3c;
            
            /* Flexbox to center the text inside */
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <h2>50% Viewport (50vw x 50vh)</h2>
    <div class="half-screen">
        I take up exactly half your screen's width and height.
    </div>

    <h2>16.6% Viewport (16.6vw) - Exactly 1/6th</h2>
    <div class="one-sixth-container">
        <div class="one-sixth-screen">16.6vw</div>
        <div class="one-sixth-screen">16.6vw</div>
        <div class="one-sixth-screen">16.6vw</div>
    </div>

</body>
</html>
