name: Daily datapipe CCW

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

concurrency:
  group: weatatmos-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run-datapipe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run daily pipeline
        run: |
          python -m datapipe.cli daily --date "$(date -u +%F)"
